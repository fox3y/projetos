<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Flow Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --gray: #8b949e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 60px 20px; }
        .container { width: 100%; max-width: 600px; }
        .header-back { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; text-decoration: none; color: var(--text); }
        .header-back:hover { color: var(--blue); }
        .section-title { margin: 20px 0 15px; font-size: 0.75rem; text-transform: uppercase; color: var(--gray); letter-spacing: 2px; }
        .service-list { display: flex; flex-direction: column; gap: 10px; }
        .service-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 15px; }
        .icon-box { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #58a6ff15; color: var(--blue); }
        .field-box { display: flex; flex-direction: column; flex: 1; }
        .field-box label { font-size: 0.65rem; color: var(--blue); font-weight: bold; text-transform: uppercase; }
        .field-box input, .field-box textarea { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 0.9rem; margin-top: 2px; }
        .btn-submit { width: 100%; cursor: pointer; background: rgba(88, 166, 255, 0.1); border: 1px solid var(--blue); color: var(--blue); font-weight: bold; justify-content: center; padding: 18px; border-radius: 12px; margin-top: 20px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-submit:hover { background: var(--blue); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="header-back">
            <i class="fas fa-arrow-left"></i>
            <h2>Voltar ao Painel</h2>
        </a>

        <div class="section-title">Preencha seus dados</div>
        <form action="https://formspree.io/f/xnjodylo" method="POST" class="service-list">
            
            <div class="service-item">
                <div class="icon-box"><i class="fas fa-user"></i></div>
                <div class="field-box">
                    <label>Nome Completo</label>
                    <input type="text" name="name" placeholder="Como te chamamos?" required>
                </div>
            </div>

            <div class="service-item">
                <div class="icon-box"><i class="fas fa-envelope"></i></div>
                <div class="field-box">
                    <label>E-mail de Contato</label>
                    <input type="email" name="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="service-item" style="align-items: flex-start;">
                <div class="icon-box" style="margin-top: 5px;"><i class="fas fa-comment"></i></div>
                <div class="field-box">
                    <label>Sua Mensagem</label>
                    <textarea name="message" rows="4" placeholder="O que você está achando do conteúdo?"></textarea>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i> ENVIAR INFORMAÇÕES
            </button>
        </form>
    </div>
</body>
</html>
